name: School ERP CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Build & Verify Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Run Eslint Check
        run: npm run lint --if-present

      - name: Build Vite App (Production bundle)
        run: npm run build
        env:
          VITE_API_URL: "https://school-erp-backend.onrender.com"

  # Job 2: Verify Backend API
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Security Vulnerability Scan (NPM Audit)
        working-directory: ./backend
        run: npm audit --audit-level=high --if-present

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test --if-present
