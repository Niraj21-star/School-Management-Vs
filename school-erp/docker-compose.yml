version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: school_erp_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - school_erp_net

  # Express Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_erp_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/school_erp
      - PORT=5000
      - JWT_SECRET=production_secret_override_me
      - CORS_ORIGIN=http://localhost:80
      - TRUST_PROXY=true
    depends_on:
      - mongodb
    networks:
      - school_erp_net

  # Frontend Web Client Service (served via Nginx)
  frontend:
    image: nginx:alpine
    container_name: school_erp_frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - school_erp_net

volumes:
  mongo_data:

networks:
  school_erp_net:
    driver: bridge
